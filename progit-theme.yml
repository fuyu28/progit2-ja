extends: default
font:
  catalog:
    Noto Serif:
      normal: GEM_FONTS_DIR/notoserif-regular-subset.ttf
      bold: GEM_FONTS_DIR/notoserif-bold-subset.ttf
      italic: GEM_FONTS_DIR/notoserif-italic-subset.ttf
      bold_italic: GEM_FONTS_DIR/notoserif-bold_italic-subset.ttf
    M+ 1mn:
      normal: GEM_FONTS_DIR/mplus1mn-regular-subset.ttf
      bold: GEM_FONTS_DIR/mplus1mn-bold-subset.ttf
      italic: GEM_FONTS_DIR/mplus1mn-italic-subset.ttf
      bold_italic: GEM_FONTS_DIR/mplus1mn-bold_italic-subset.ttf
    IPAMincho:
      normal: /usr/share/fonts/OTF/ipam.ttf
      bold: /usr/share/fonts/OTF/ipam.ttf
      italic: /usr/share/fonts/OTF/ipam.ttf
      bold_italic: /usr/share/fonts/OTF/ipam.ttf
    IPAGothic:
      normal: /usr/share/fonts/OTF/ipag.ttf
      bold: /usr/share/fonts/OTF/ipag.ttf
      italic: /usr/share/fonts/OTF/ipag.ttf
      bold_italic: /usr/share/fonts/OTF/ipag.ttf
  fallbacks: [IPAMincho, IPAGothic]
base:
  text_align: left
image:
  align: center
codespan:
  font_family: M+ 1mn
code:
  font_family: M+ 1mn
